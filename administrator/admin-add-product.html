<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <link href="/onlineshop/bootstrap/bootstrap_css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/onlineshop/icons/bootstrapicons/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f0f2f5;
        }
        .form-container {
            max-width: 1200px;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .form-header {
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .image-preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-top: 10px;
            display: none;
        }
        .required:after {
            content: " *";
            color: red;
        }
        .section-title {
            background: #f8f9fa;
            padding: 10px 15px;
            margin: 20px 0 15px 0;
            border-left: 4px solid #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="adminContent" style="display: none;">
        <div class="container">
            <div class="form-container">
                <div class="form-header bg-primary">
                    <div class="d-flex pb-2 justify-content-between align-items-center">
                        <h3 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Product</h3>
                        <a href="/onlineshop/administrator/logout.php" class="btn btn-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </div>
                    
                    <p class="mb-0 opacity-75">Fill in all product details below</p>
                </div>
                
                <form id="productForm" enctype="multipart/form-data">
                    <!-- Basic Information -->
                    <div class="section-title">
                        <i class="bi bi-info-circle"></i> Basic Information
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Product Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Slug (URL friendly)</label>
                            <input type="text" class="form-control" id="slug" placeholder="auto-generated from name">
                            <small class="text-muted">Leave empty to auto-generate</small>
                        </div>
                    </div>
                    
                    <!-- Pricing -->
                    <div class="section-title">
                        <i class="bi bi-tag"></i> Pricing
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label required">Price (UGX)</label>
                            <input type="number" class="form-control" id="price" step="0.01" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Discount (%)</label>
                            <input type="number" class="form-control" id="discount" value="0" step="1" min="0" max="100">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Old Price (UGX)</label>
                            <input type="number" class="form-control" id="oldPrice" step="0.01">
                            <small class="text-muted">Original price before discount</small>
                        </div>
                    </div>
                    
                    <!-- Categories -->
                    <div class="section-title">
                        <i class="bi bi-folder"></i> Categories & Classification
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label required">Category</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select Category</option>
                                <option value="laptops">Laptops</option>
                                <option value="phones">Phones</option>
                                <option value="audio">Audio</option>
                                <option value="cctv">CCTV</option>
                                <option value="tv">Televisions</option>
                                <option value="desktops">Desktops</option>
                                <option value="storage">Storage</option>
                                <option value="gaming">Gaming</option>
                                <option value="accessories">Accessories</option>
                                <option value="networking">Networking</option>
                                <option value="power">Power</option>
                                <option value="office">Office Equipment</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Subcategory</label>
                            <select class="form-select" id="subcategory">
                                <option value="">Select Subcategory</option>
                                <option value="business-laptops">Business Laptops</option>
                                <option value="gaming-laptops">Gaming Laptops</option>
                                <option value="premium-laptops">Premium Laptops</option>
                                <option value="earbuds">Earbuds</option>
                                <option value="headphones">Headphones</option>
                                <option value="wireless-earbuds">Wireless Earbuds</option>
                                <option value="smartphones">Smartphones</option>
                                <option value="tablets">Tablets</option>
                                <option value="security-cameras">Security Cameras</option>
                                <option value="smart-tv">Smart TV</option>
                                <option value="ssd">SSD</option>
                                <option value="hdd">HDD</option>
                                <option value="chargers">Chargers</option>
                                <option value="usb-hubs">USB Hubs</option>
                                <option value="cables">Cables</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Brand</label>
                            <select class="form-select" id="brand">
                                <option value="">Select Brand</option>
                                <option value="hp">HP</option>
                                <option value="dell">Dell</option>
                                <option value="lenovo">Lenovo</option>
                                <option value="asus">ASUS</option>
                                <option value="acer">Acer</option>
                                <option value="apple">Apple</option>
                                <option value="samsung">Samsung</option>
                                <option value="lg">LG</option>
                                <option value="sony">Sony</option>
                                <option value="jbl">JBL</option>
                                <option value="anker">Anker</option>
                                <option value="ugreen">UGREEN</option>
                                <option value="corsair">Corsair</option>
                                <option value="hyperx">HyperX</option>
                                <option value="western-digital">Western Digital</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Type & Tags -->
                    <div class="section-title">
                        <i class="bi bi-tags"></i> Type & Tags
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label required">Type</label>
                            <select class="form-select" id="type" required>
                                <option value="">Select Type</option>
                                <option value="new">New</option>
                                <option value="top-selling">Top Selling</option>
                                <option value="discounted">Discounted</option>
                                <option value="trending">Trending</option>
                                <option value="student">Student</option>
                                <option value="office">Office</option>
                                <option value="business">Business</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tag</label>
                            <select class="form-select" id="tag">
                                <option value="">No Tag</option>
                                <option value="New">New</option>
                                <option value="Trending">Trending</option>
                                <option value="50% OFF">50% OFF</option>
                                <option value="30% OFF">30% OFF</option>
                                <option value="Limited Stock">Limited Stock</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Popular</label>
                            <select class="form-select" id="isPopular">
                                <option value="NO">No</option>
                                <option value="YES">Yes</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Status & Meta -->
                    <div class="section-title">
                        <i class="bi bi-gear"></i> Status & Meta
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Available (In Stock)</label>
                            <select class="form-select" id="available">
                                <option value="1">Yes (Available)</option>
                                <option value="0">No (Out of Stock)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Posted By</label>
                            <input type="text" class="form-control" id="postedBy" value="Admin">
                        </div>
                    </div>
                    
                    <!-- Image -->
                    <div class="section-title">
                        <i class="bi bi-image"></i> Product Image
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Product Image</label>
                        <input type="file" class="form-control" id="image" accept="image/*" required>
                        <img id="imagePreview" class="image-preview" alt="Preview">
                    </div>
                    
                    <!-- Description -->
                    <div class="section-title">
                        <i class="bi bi-file-text"></i> Description
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Full Description</label>
                        <textarea class="form-control" id="description" rows="8" placeholder="Enter detailed product description..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <i class="bi bi-save"></i> Save Product
                    </button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
    
    <div id="accessDenied" style="display: none; text-align: center; margin-top: 100px;">
        <div class="container">
            <div class="card" style="max-width: 500px; margin: auto;">
                <div class="card-body">
                    <i class="bi bi-shield-lock" style="font-size: 64px; color: #dc3545;"></i>
                    <h2 class="mt-3">Access Denied</h2>
                    <p>You need to be logged in as admin.</p>
                    <a href="/onlineshop/administrator/admin-login.html" class="btn btn-primary">Go to Admin Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-generate slug from product name
        document.getElementById('name').addEventListener('input', function() {
            const name = this.value;
            const slug = name.toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
            document.getElementById('slug').value = slug;
        });
        
        // Auto-calculate old price when discount is entered
        document.getElementById('discount').addEventListener('input', function() {
            const price = document.getElementById('price').value;
            const discount = this.value;
            if (price && discount && discount > 0) {
                const oldPrice = parseFloat(price) / (1 - parseFloat(discount) / 100);
                document.getElementById('oldPrice').value = oldPrice.toFixed(2);
            } else if (discount == 0) {
                document.getElementById('oldPrice').value = '';
            }
        });
        
        // Image preview
        document.getElementById('image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Check if admin is logged in
        async function checkAdmin() {
            try {
                const response = await fetch('/onlineshop/administrator/check-admin.php');
                const data = await response.json();
                
                if (data.admin) {
                    document.getElementById('adminContent').style.display = 'block';
                } else {
                    document.getElementById('accessDenied').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('accessDenied').style.display = 'block';
            }
        }
        
        // Form submission
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving...';
            
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('slug', document.getElementById('slug').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('discount', document.getElementById('discount').value);
            formData.append('old_price', document.getElementById('oldPrice').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('subcategory', document.getElementById('subcategory').value);
            formData.append('brand', document.getElementById('brand').value);
            formData.append('type', document.getElementById('type').value);
            formData.append('tag', document.getElementById('tag').value);
            formData.append('is_popular', document.getElementById('isPopular').value);
            formData.append('available', document.getElementById('available').value);
            formData.append('posted_by', document.getElementById('postedBy').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('image', document.getElementById('image').files[0]);
            
            try {
                const response = await fetch('/onlineshop/administrator/add-product.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ Product added successfully!</div>';
                    document.getElementById('productForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    document.getElementById('slug').value = '';
                    document.getElementById('message').scrollIntoView({ behavior: 'smooth' });
                } else {
                    document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ ' + (result.error || 'Error saving product') + '</div>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ Network error. Please try again.</div>';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-save"></i> Save Product';
            }
        });
        
        checkAdmin();
    </script>
</body>
</html>
