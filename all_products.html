<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Willy and Sons Uganda based online store dealing in a variety of products">
  <meta name="keywords" content="Willy and Sons Ugandan online store, Shop anywhere in Uganda, Products for delivery in Uganda, Buy products online in Uganda">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Willy">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="/onlineshop/willysonsicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/onlineshop/css/custom-css/navbar-css/navbar.css">
  <link rel="stylesheet" href="/onlineshop/icons/bootstrapicons/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/onlineshop/bootstrap/bootstrap_css/bootstrap.min.css">
  <link rel="stylesheet" href="/onlineshop/css/custom-css/main-body-css/main-body.css">
  <link rel="stylesheet" href="/onlineshop/css/custom-css/footer-css/footer-css.css">
  <link rel="stylesheet" href="/onlineshop/js/swiperjs/swiper-bundle.min.css">
  <link rel="stylesheet" href="/onlineshop/aos/aos_css/aos.css">
  <title>Willy and Sons Official Online Store</title>
  <style>
    #auth-section {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 0;
      width: 200px;
      min-width: 120px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
    }
    #auth-section a {
      display: block;
      padding: 8px 16px;
      text-decoration: none;
      color: #333;
      font-size: 20px;
    }
    #user-view span {
      padding: 8px 16px;
      font-size: 14px;
    }
    #auth-section a:hover {
      background-color: #f5f5f5;
    }
    #auth-section.show {
      display: block !important;
    }
  </style>
  <script>
      document.addEventListener('click', (e) => {
        const userIcon = e.target.closest('#user-icon');
        const authSection = document.getElementById('auth-section');
        if (userIcon) {
          authSection.classList.toggle('show')
          return;
        }
        if (e.target.closest('#auth-section')) { return; }
        authSection.classList.remove('show');
      });
</script>
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .product-card img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .product-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1;
        }
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #e67e22;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 14px;
            color: #999;
            margin-right: 8px;
        }
        .product-desc {
            font-size: 13px;
            color: #666;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .load-more-container {
            text-align: center;
            margin: 40px 0;
        }
        .load-more-btn {
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .no-more-products {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            display: none;
        }
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .sort-select {
            width: 200px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .category-badge {
            padding: 6px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .category-badge.active {
            background: #28a745;
            color: white;
        }
        .category-badge:hover {
            background: #ddd;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card {
            animation: fadeIn 0.3s ease forwards;
        }
        .btn-add-to-cart {
            width: 100%;
        }
    </style>
</head>
<body class="bg-light">
    <nav id="navigationBar" class="container-fluid fixed-top shadow-sm" style="background: #ffffff;"></nav>
    
    <div class="container" style="margin-top: 100px;">
        <div class="products-header">
            <h2 class="fw-bold">All Products</h2>
            <div class="d-flex gap-3">
                <select id="sort-select" class="sort-select">
                    <option value="default">Sort by: Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="name_asc">Name: A to Z</option>
                    <option value="name_desc">Name: Z to A</option>
                </select>
            </div>
        </div>
        
        <div class="category-filter" id="category-filter">
            <span class="category-badge active" data-category="all">All</span>
        </div>
        
        <div id="products-container" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading products...</p>
            </div>
        </div>
        
        <div class="load-more-container">
            <button id="load-more-btn" class="btn btn-primary load-more-btn">
                Load More Products
            </button>
            <div class="loading-spinner" id="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading more products...</p>
            </div>
            <div class="no-more-products" id="no-more-products">
                <i class="bi bi-check-circle"></i> You've seen all products!
            </div>
        </div>
    </div>
    
    <footer id="index-footer" class="container pb-5 mt-4"></footer>
    
    <script src="/onlineshop/bootstrap/bootstrap_js/bootstrap.bundle.min.js"></script>
    <script src="/onlineshop/js/custom-js/navbar-js/fetch-navbar.js"></script>
    <script src="/onlineshop/js/custom-js/footer-js/fetch-footer.js"></script>
    
    <script type="module">
        import { getCart, addToCart, removeFromCart, updateCartCount } from '/onlineshop/shopping-cart/cart-functionality/cart_core.js';
        
        let allProducts = [];
        let displayedProducts = [];
        let currentLimit = 24;
        let currentCategory = 'all';
        let currentSort = 'default';
        let isLoading = false;
        let categories = new Set();
        
        const container = document.getElementById('products-container');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const noMoreProducts = document.getElementById('no-more-products');
        const sortSelect = document.getElementById('sort-select');
        const categoryFilter = document.getElementById('category-filter');
        
        async function fetchProducts() {
            try {
                const response = await fetch('/onlineshop/api/products.php');
                const products = await response.json();
                return products;
            } catch (error) {
                console.error('Failed to fetch products:', error);
                return [];
            }
        }
        
        async function loadProducts() {
            allProducts = await fetchProducts();
            
            allProducts.forEach(product => {
                if (product.category) {
                    categories.add(product.category);
                }
            });
            
            renderCategoryFilters();
            
            applyFiltersAndSort();
        }
        
        function renderCategoryFilters() {
            let html = '<span class="category-badge active" data-category="all">All</span>';
            const sortedCategories = Array.from(categories).sort();
            sortedCategories.forEach(category => {
                html += `<span class="category-badge" data-category="${category}">${category.charAt(0).toUpperCase() + category.slice(1)}</span>`;
            });
            categoryFilter.innerHTML = html;
            
            document.querySelectorAll('.category-badge').forEach(badge => {
                badge.addEventListener('click', () => {
                    document.querySelectorAll('.category-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    currentCategory = badge.dataset.category;
                    currentLimit = 24;
                    applyFiltersAndSort();
                });
            });
        }

        function applyFiltersAndSort() {
            let filtered = [...allProducts];
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            if (currentSort === 'price_asc') {
                filtered.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
            } else if (currentSort === 'price_desc') {
                filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
            } else if (currentSort === 'name_asc') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (currentSort === 'name_desc') {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            }
            
            displayedProducts = filtered;
            
            currentLimit = 24;
            renderProducts();
        }
        
        async function renderProducts() {
            const cart = await getCart();
            const productsToShow = displayedProducts.slice(0, currentLimit);
            
            if (productsToShow.length === 0 && currentLimit === 24) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="bi bi-box-seam" style="font-size: 64px; color: #ccc;"></i>
                        <h4 class="mt-3 text-muted">No products found</h4>
                    </div>
                `;
                loadMoreBtn.style.display = 'none';
                return;
            }
            
            let html = '';
            productsToShow.forEach(product => {
                const inCart = cart.some(item => item.id == product.id);
                
                let tagClass = 'bg-success';
                if (product.tag === 'Trending') tagClass = 'bg-warning text-dark';
                if (product.tag === '50% OFF') tagClass = 'bg-danger';
                
                let priceHtml = `<span class="product-price">UGX ${Number(product.price).toLocaleString()}</span>`;
                if (product.discount) {
                    const oldPrice = product.old_price || (product.price / (1 - product.discount/100));
                    priceHtml = `
                        <!-- <span class="old-price">UGX ${Number(oldPrice).toLocaleString()}</span>-->
                        <span class="product-price">UGX ${Number(product.price).toLocaleString()}</span>
                    `;
                }
                
                html += `
                    <div class="col-6 col-md-3">
                        <div class="card product-card h-100 text-center">
                            <a href="/onlineshop/product-view.html?id=${product.id}" class="text-decoration-none text-dark">
                                <div class="position-relative">
                                    <img src="${product.image || '/onlineshop/images/placeholder.jpg'}" class="card-img-top" alt="${product.name}">
                                    ${product.tag ? `<span class="badge ${tagClass} product-tag">${product.tag}</span>` : ''}
                                </div>
                            </a>
                            <div class="card-body">
                                <a href="/onlineshop/product-view.html?id=${product.id}" class="text-decoration-none text-dark">
                                    <h5 class="card-title">${escapeHtml(product.name)}</h5>
                                </a>
                                <div class="product-desc-wrapper border-top">
                                    <p class="product-desc">${escapeHtml((product.description || '').substring(0, 100))}...</p>
                                    <a href="/onlineshop/product-view.html?id=${product.id}" class="more-link">More</a>
                                </div>
                                <div class="mt-2">
                                    ${priceHtml}
                                </div>
                                <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
                                    <button class="btn ${inCart ? 'btn-danger' : 'btn-primary'} btn-sm btn-add-to-cart add-to-cart-btn" 
                                        data-id="${product.id}"
                                        data-name="${escapeHtml(product.name)}"
                                        data-price="${product.price}"
                                        data-image="${product.image || ''}"
                                        data-desc="${escapeHtml(product.description || '')}">
                                        ${inCart ? 'Undo Add' : 'Add to Cart'}
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm favorite-btn">
                                        <i class="bi bi-heart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            if (currentLimit >= displayedProducts.length) {
                loadMoreBtn.style.display = 'none';
                noMoreProducts.style.display = 'block';
            } else {
                loadMoreBtn.style.display = 'block';
                noMoreProducts.style.display = 'none';
            }
            
            attachProductEvents();
        }
        
        function attachProductEvents() {
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddToCart);
                btn.addEventListener('click', handleAddToCart);
            });
        }
        
        async function handleAddToCart(event) {
            const btn = event.currentTarget;
            const product = {
                id: btn.dataset.id,
                name: btn.dataset.name,
                price: parseFloat(btn.dataset.price),
                image: btn.dataset.image,
                desc: btn.dataset.desc
            };
            
            const cart = await getCart();
            const inCart = cart.some(item => item.id == product.id);
            
            if (inCart) {
                await removeFromCart(product.id);
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-primary');
                btn.textContent = 'Add to Cart';
            } else {
                await addToCart(product, 1);
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-danger');
                btn.textContent = 'Undo Add';
            }
            
            updateCartCount();
        }
        
        async function loadMore() {
            if (isLoading) return;
            if (currentLimit >= displayedProducts.length) return;
            
            isLoading = true;
            loadingSpinner.style.display = 'block';
            loadMoreBtn.style.display = 'none';
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            currentLimit += 24;
            await renderProducts();
            
            loadingSpinner.style.display = 'none';
            isLoading = false;
        }
        
        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            currentLimit = 24;
            applyFiltersAndSort();
        });
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function init() {
            await loadProducts();
            updateCartCount();
            
            loadMoreBtn.addEventListener('click', loadMore);
        }
        
        init();
    </script>
</body>
</html>
