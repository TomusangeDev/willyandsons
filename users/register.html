<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Willy and Sons Uganda based online store dealing in a variety of products">
  <meta name="keywords" content="Willy and Sons Ugandan online store, Shop anywhere in Uganda, Products for delivery in Uganda, Buy products online in Uganda">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Willy">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="/onlineshop/willysonsicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/onlineshop/css/custom-css/navbar-css/navbar.css">
  <link rel="stylesheet" href="/onlineshop/icons/bootstrapicons/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/onlineshop/bootstrap/bootstrap_css/bootstrap.min.css">
   <link rel="stylesheet" href="/onlineshop/users/register.css">
  <link rel="stylesheet" href="/onlineshop/css/custom-css/footer-css/footer-css.css">
  <link rel="stylesheet" href="/onlineshop/js/swiperjs/swiper-bundle.min.css">
  <link rel="stylesheet" href="/onlineshop/aos/aos_css/aos.css">
  <title>Willy and Sons Official Online Store</title>
<style>
#auth-section {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 0;
    min-width: 120px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 1000;
}
#auth-section a {
    display: block;
    padding: 8px 16px;
    text-decoration: none;
    color: #333;
    font-size: 14px;
}
#auth-section a:hover {
    background-color: #f5f5f5;
}
#auth-section.show {
    display: block !important;
}
</style>
    <script>
      document.addEventListener('click', (e) => {
        const userIcon = e.target.closest('#user-icon');
        const authSection = document.getElementById('auth-section');
        if (userIcon) {
          authSection.classList.toggle('show')
          return;
        }
        if (e.target.closest('#auth-section')) { return; }
        authSection.classList.remove('show');
      });
</script>
</head>
<body class="bg-light">
      <nav id="navigationBar" class="container-fluid fixed-top shadow-sm" style="background: #ffffff; border-bottom: 1px solid #cfcece !important;"></nav>
  <!-- <script type="module" src="/onlineshop/js/import-shared-components/import-all-shared-components.js"></script> -->
  <div style="height: 85px;"></div>  
  <div class="register-container" >
        <div class="register-card" data-aos="fade-up" data-aos-duration="1000">
            <div class="card-header bg-primary">
                <h2>Create Account</h2>
                <p>Join Willy and Sons today</p>
            </div>
            <div class="card-body">
                <div id="successMessage" class="success-message">
                    <i class="bi bi-check-circle-fill"></i>
                    <span id="successText"></span>
                </div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="fullname" placeholder="Enter your full name" required>
                        </div>
                        <div class="error-message" id="nameError">Please enter your full name</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" autocomplete="current-email" placeholder="Enter your email" required>
                        </div>
                        <div class="error-message" id="emailError">Please enter a valid email address</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="tel" class="form-control" id="phone" autocomplete="current-phone" placeholder="Enter your phone number">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Country</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-globe"></i></span>
                            <select class="form-control" id="country">
                                <option value="">Select your country</option>
                                <option value="Uganda">Uganda</option>
                                <option value="Kenya">Kenya</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" autocomplete="off" placeholder="Create a password" required>
                            <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                                <i class="bi bi-eye-slash"></i>
                            </span>
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>
                        <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="confirmPassword"  autocomplete="off" placeholder="Confirm your password" required>
                        </div>
                        <div class="error-message" id="confirmError">Passwords do not match</div>
                    </div>
                    
                    <div class="terms">
                        <input type="checkbox" id="termsCheckbox">
                        <label>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>
                    
                    <button type="submit" class="btn-register bg-primary" id="submitBtn">
                        <i class="bi bi-person-plus"></i> Create Account
                    </button>
                    
                    <div class="login-link">
                        Already have an account? <a href="/onlineshop/users/login.html">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

      <!-- footer -->
  <footer id="index-footer" class="container pb-5 mt-5"></footer>

 <script type="module" src="/onlineshop/import-products.js"></script>
  <script src="/onlineshop/js/custom-js/navbar-js/fetch-navbar.js"></script>
  <script src="/onlineshop/js/custom-js/footer-js/fetch-footer.js"></script>
  <script src="/onlineshop/js/swiperjs/swiper-bundle.min.js"></script>
  <script src="/onlineshop/aos/aos_js/aos.js"></script>
  <script>
        AOS.init();
        
        const form = document.getElementById('registerForm');
        const fullname = document.getElementById('fullname');
        const email = document.getElementById('email');
        const phone = document.getElementById('phone');
        const country = document.getElementById('country');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const submitBtn = document.getElementById('submitBtn');
        
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');
        
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        
        const togglePassword = document.getElementById('togglePassword');
        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            togglePassword.querySelector('i').classList.toggle('bi-eye');
            togglePassword.querySelector('i').classList.toggle('bi-eye-slash');
        });
        
        password.addEventListener('input', function() {
            const strength = document.getElementById('passwordStrength');
            const value = this.value;
            
            if (value.length === 0) {
                strength.className = 'password-strength';
                return;
            }
            
            if (value.length < 4) {
                strength.className = 'password-strength strength-weak';
            } else if (value.length < 8) {
                strength.className = 'password-strength strength-medium';
            } else {
                strength.className = 'password-strength strength-strong';
            }
        });
        
        fullname.addEventListener('input', () => {
            if (fullname.value.trim().length < 2) {
                nameError.style.display = 'block';
            } else {
                nameError.style.display = 'none';
            }
        });
        
        email.addEventListener('input', () => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                emailError.style.display = 'block';
            } else {
                emailError.style.display = 'none';
            }
        });
        
        password.addEventListener('input', () => {
            if (password.value.length < 6) {
                passwordError.style.display = 'block';
            } else {
                passwordError.style.display = 'none';
            }
            
            if (confirmPassword.value && password.value !== confirmPassword.value) {
                confirmError.style.display = 'block';
            } else {
                confirmError.style.display = 'none';
            }
        });
        
        confirmPassword.addEventListener('input', () => {
            if (password.value !== confirmPassword.value) {
                confirmError.style.display = 'block';
            } else {
                confirmError.style.display = 'none';
            }
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let isValid = true;
            
            if (fullname.value.trim().length < 2) {
                nameError.style.display = 'block';
                isValid = false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                emailError.style.display = 'block';
                isValid = false;
            }
            
            if (password.value.length < 6) {
                passwordError.style.display = 'block';
                isValid = false;
            }
            
            if (password.value !== confirmPassword.value) {
                confirmError.style.display = 'block';
                isValid = false;
            }
            
            if (!termsCheckbox.checked) {
                alert('Please agree to the Terms of Service');
                isValid = false;
            }
            
            if (!isValid) return;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating account...';
            
            try {
                const response = await fetch('/onlineshop/api/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: fullname.value.trim(),
                        email: email.value.trim(),
                        phone: phone.value.trim(),
                        country: country.value,
                        password: password.value
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successText.textContent = data.message || 'Account created successfully! Redirecting to login...';
                    successMessage.style.display = 'flex';
                    
                    setTimeout(() => {
                        window.location.href = '/onlineshop/users/login.html';
                    }, 2000);
                } else {
                    alert(data.error || 'Registration failed. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
